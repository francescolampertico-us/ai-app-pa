id: media_clips
name: Media Clips
version: 0.1.0
risk_level: yellow
tags: [media_monitoring, google_news, docx, email, public_affairs]

description: >
  Daily media monitoring tool. Searches Google News with Boolean queries, filters to trusted sources,
  deduplicates results, extracts article text where possible, generates a formatted .docx, and creates a
  draft email in Mail.app with the document attached.

execution:
  entrypoint: tools/media_clips/execution/generate_clips.py
  runtime: python
  notes:
    - "Email draft creation uses Mail.app via osascript (macOS). Doc generation works without Mail."

inputs:
  required:
    - topic: "Title used in the doc and email subject (e.g., 'India Media Clips')."
    - queries: "Comma-separated list of Boolean search queries."
  optional:
    - period: "GNews timeframe (e.g., 12h, 24h, 72h, 7d). If omitted: 72h on Mondays, else 24h."
    - since: "Filter out articles published before this timestamp (YYYY-MM-DD HH:MM)."
    - target_date: "Override the date used for the report filename (YYYY-MM-DD)."
    - suffix: "Filename suffix (e.g., 'Partial')."
    - output_dir: "Base output directory (topic subfolder is created inside)."
    - email_sender: "Sender email address used in Mail.app draft."
    - email_recipient: "Comma-separated recipients for the Mail.app draft."

outputs:
  artifacts:
    - docx_report:
        format: docx
        description: "Formatted report with title page, index, and full clips."
        path_pattern: "<output_dir>/<topic>/<safe_topic>_<Month_DD>[_<suffix>].docx"
    - email_draft:
        format: mail_app_draft
        description: "Draft email created in Mail.app with the .docx attached."
  output_contract:
    required_sections:
      - "Title Page (topic + date)"
      - "Index (numbered list with links)"
      - "Clips (source, title link, author, date, subtitle/lede, body)"
    placeholders:
      - "[PASTE FULL TEXT HERE] when extraction fails (often paywalls)."

governance:
  review:
    required_for_external_use: true
    checklist:
      - "Scan relevance: each clip truly matches the query set."
      - "Check duplicates / missing key stories."
      - "Paywalls: replace any '[PASTE FULL TEXT HERE]' with cleaned pasted text."
      - "Verify author/date formatting for high-sensitivity distributions."
      - "Confirm recipients before sending the Mail draft."

dependencies:
  python_packages:
    - gnews
    - python-docx
    - trafilatura
    - newspaper3k
    - python-dateutil
    - pytz
    - requests
    - googlenewsdecoder
  system:
    - "Internet access"
    - "macOS Mail.app + osascript (optional, only for email draft step)"

notes:
  - "Trusted/blocked source lists are currently configured inside the execution script."
  - "Topic is currently used to create an output folder and to label the report."
