id: media_list_builder
name: Media List Builder
version: 0.1.0
risk_level: yellow
digiacomo_process: "#5 Media Relations"

description: >
  Generates a targeted media list for pitching based on a policy issue,
  geographic scope, and media type filter. Finds journalists and outlets
  covering the beat via Google News research and LLM synthesis, then
  produces a downloadable Excel table with contact details, pitch angles,
  and links to previous coverage.

inputs:
  required:
    - issue           # Policy issue or topic to pitch
  optional:
    - location        # Geographic scope: "US", state name, city, or metro area (default: US)
    - media_types     # Filter: mainstream, print, broadcast, digital, trade, podcast (default: all)
    - num_contacts    # Target number of contacts to generate (default: 20)

outputs:
  format: xlsx + markdown
  artifacts:
    - media_list.xlsx      # Excel spreadsheet with full media list
    - media_list.md        # Markdown summary

execution:
  entry: execution/run.py
  dependencies:
    - openai
    - openpyxl
    - gnews
  environment:
    - "OPENAI_API_KEY: Required for journalist research and angle generation"
  models:
    - "gpt-4o: Journalist identification, pitch angle generation"

risk_notes:
  - "Journalist names, roles, and outlets are LLM-generated — verify against current mastheads."
  - "Email addresses are pattern-guessed and MUST be verified before sending."
  - "Beat assignments change frequently — confirm coverage area is current."
  - "Previous story links come from Google News and may not be comprehensive."
