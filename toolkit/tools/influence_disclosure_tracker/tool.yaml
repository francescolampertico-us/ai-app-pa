id: influence_disclosure_tracker
name: Influence Disclosure Tracker
version: 0.3.0
risk_level: yellow
tags: [influence, lobbying, disclosure, lda, fara, public_affairs]

description: >
  Cross-references an entity across LDA (lobbying), FARA (foreign agents), and IRS 990 (nonprofits),
  producing normalized CSV tables and a per-source markdown summary report. Sections are gated to
  selected sources only; unselected sources are fully suppressed from output.

execution:
  entrypoint: tools/influence_disclosure_tracker/execution/run.py
  runtime: python
  notes:
    - "LDA API endpoint: lda.senate.gov/api/v1/ — set LDA_API_KEY for higher rate limits."
    - "FARA uses bulk CSV downloads from efile.fara.gov, cached locally for 24 hours."
    - "IRS 990 uses ProPublica Nonprofit Explorer API; 1–3 year filing lag is expected."

inputs:
  required:
    - entities: "Comma-separated list of entities to search."
  optional:
    - filing_years: "Comma-separated years, e.g. 2022,2023,2024 (omit for all years)."
    - from: "Start date override (YYYY-MM-DD); derived from filing_years if omitted."
    - to: "End date override (YYYY-MM-DD); derived from filing_years if omitted."
    - sources: "Comma-separated data sources (default: lda,fara,irs990)."
    - search_field: "client | registrant | both (default: both)."
    - mode: "basic (default) or deep (XML parse + LLM enrichment for IRS 990)."
    - out: "Base output directory (default: ./output)."
    - max_results: "Maximum results per source per entity (default: 500)."
    - cache_dir: "Cache directory (default: .cache/influence_disclosure_tracker)."

outputs:
  artifacts:
    - master_results.csv:
        format: csv
        description: "Unified match-level results across LDA and FARA."
        path_pattern: "<out>/<entity_or_multiple>/master_results.csv"
    - lda_*.csv:
        format: csv
        description: "LDA detail tables (filings, issues, lobbyists)."
        path_pattern: "<out>/<entity_or_multiple>/lda_*.csv"
    - fara_*.csv:
        format: csv
        description: "FARA detail tables (registrants, foreign principals, documents, short forms)."
        path_pattern: "<out>/<entity_or_multiple>/fara_*.csv"
    - irs990_*.csv:
        format: csv
        description: "IRS 990 nonprofit tables (organizations, filings, plus deep tables if mode=deep)."
        path_pattern: "<out>/<entity_or_multiple>/irs990_*.csv"
    - report.md:
        format: markdown
        description: "Narrative summary with match confidence notes and LLM enrichment if mode=deep."
        path_pattern: "<out>/<entity_or_multiple>/report.md"

governance:
  review:
    required_for_external_use: true
    checklist:
      - "Verify entity name matches for any fuzzy/contains matches."
      - "Confirm dates fall within the intended timeframe."
      - "Spot-check filing URLs and document dates."
      - "Manual verification required before external distribution."

dependencies:
  python_packages:
    - requests
    - pandas
    - rapidfuzz
    - python-dateutil
    - urllib3<2
  system:
    - "Internet access for LDA/FARA APIs"

notes:
  - "FARA bulk CSV data is cached locally for 24 hours; first run downloads ~3 MB."
