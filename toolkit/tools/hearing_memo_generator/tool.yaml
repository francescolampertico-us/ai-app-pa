id: hearing_memo_generator
name: Congressional Hearing Memo Generator
version: 1.0.0
risk_level: yellow
tags: [hearing, memo, public_affairs, transcript, docx]

description: >
  Converts congressional hearing transcripts or source text into a professional
  hearing memo using a controlled structure, house-style rules, and a
  verification pass. Output is always a draft pending human review.

execution:
  entrypoint: tools/hearing_memo_tool_package/execution/run.py
  runtime: python
  notes:
    - "Requires OPENAI_API_KEY for best extraction quality; runs in heuristic fallback without it."

inputs:
  required:
    - input: "Path to hearing transcript (PDF or text)."
  optional:
    - output: "Output DOCX path (default: output/memo.docx)."
    - memo_from: "FROM line value."
    - memo_date: "Memo date (e.g., 'Thursday, March 12, 2026')."
    - subject: "Override SUBJECT line."
    - confidentiality_footer: "Override default confidentiality footer text."
    - hearing_title: "Override hearing title if auto-detection fails."
    - hearing_date: "Override hearing date if auto-detection fails."
    - hearing_time: "Override hearing time."
    - committee: "Override committee name."
    - json_output: "Path to write structured JSON output bundle."
    - text_output: "Path to write rendered memo text (markdown)."
    - verbose: "Print detailed pipeline progress."

outputs:
  artifacts:
    - memo_docx:
        format: docx
        description: "Formatted memo with page footer."
        path_pattern: "<output>"
    - memo_text:
        format: markdown
        description: "Rendered memo text (sibling to DOCX, always written)."
        path_pattern: "<output_basename>.txt"
    - verification_json:
        format: json
        description: "Verification verdict and flags."
        path_pattern: "<output_basename>_verification.json"
    - memo_bundle_json:
        format: json
        description: "Optional structured bundle (hearing record + memo + verification)."
        path_pattern: "<json_output>"
  output_contract:
    required_sections:
      - "FROM / DATE / SUBJECT"
      - "Display Title"
      - "Hearing Overview"
      - "Committee Leadership Opening Statements"
      - "Witnesses Introductions and Testimonies"
      - "Q&A"
      - "Confidentiality Footer"

governance:
  review:
    required_for_external_use: true
    checklist:
      - "Verify hearing title, committee, and date/time against source."
      - "Confirm witness names and affiliations (no guessing)."
      - "Check overview is high-level and non-granular."
      - "Ensure Q&A is organized by member, not by topic."
      - "Validate confidentiality footer text."
      - "Resolve all verification flags before distribution."

dependencies:
  python_packages:
    - pypdf
    - python-docx
    - openai
  system:
    - "OPENAI_API_KEY (optional but recommended for extraction)"

notes:
  - "Approved heading family and style rules are defined in STYLE_GUIDE.md."
  - "Verification rules are defined in prompts/verify_memo.md and src/verifier.py."
