tools:
  - id: media_clips
    name: Media Clips
    version: 0.1.0
    risk_level: yellow
    path: tools/media_clips
    description: "Daily monitoring: Google News Boolean queries → filtered/deduped clips → .docx + optional Mail.app draft."
    inputs:
      required: [topic, queries]
      optional: [period, since, target_date, suffix, output_dir, email_sender, email_recipient]
    outputs:
      format: docx + mail_draft
      artifacts: [docx_report, email_draft]

  - id: media_clip_cleaner
    name: Media Clip Cleaner
    version: 0.3.0
    risk_level: green
    path: tools/media_clip_cleaner
    description: "Cleans pasted article text for clips: removes headline/metadata/clutter, keeps italic subtitle + clean body."
    inputs:
      required: [raw_text]
      optional: []
    outputs:
      format: markdown
      artifacts: [cleaned_text]

  - id: influence_disclosure_tracker
    name: Influence Disclosure Tracker
    version: 0.2.0
    risk_level: yellow
    path: tools/influence_disclosure_tracker
    description: "Collects LDA, FARA, and IRS 990 disclosure records, normalizes results into CSV tables, and generates a summary report. Deep mode adds XML parsing and LLM enrichment for nonprofit PA relevance."
    inputs:
      required: [entities, from, to]
      optional: [sources, mode, out, max_results, cache_dir]
    outputs:
      format: csv + markdown
      artifacts: [master_results.csv, lda_*.csv, fara_*.csv, irs990_*.csv, report.md]
  - id: hearing_memo_generator
    name: Congressional Hearing Memo Generator
    version: 1.0.0
    risk_level: yellow
    path: tools/hearing_memo_generator
    description: "Drafts house-style congressional hearing memos from transcripts with verification and DOCX export."
    inputs:
      required: [input]
      optional: [output, memo_from, memo_date, subject, confidentiality_footer, hearing_title, hearing_date, hearing_time, committee, json_output, text_output, verbose]
    outputs:
      format: docx + markdown + json
      artifacts: [memo_docx, memo_text, verification_json, memo_bundle_json]

  - id: legislative_tracker
    name: Legislative Tracker
    version: 0.1.0
    risk_level: yellow
    path: tools/legislative_tracker
    description: "Searches, tracks, and summarizes legislation across federal and state jurisdictions via LegiScan API."
    inputs:
      required: [query]
      optional: [state, year, bill_id, summarize, watchlist, out]
    outputs:
      format: json + markdown
      artifacts: [search_results.json, bill_summary.md, watchlist.json, report.md]

  - id: messaging_matrix
    name: Messaging Matrix
    version: 0.1.0
    risk_level: yellow
    path: tools/messaging_matrix
    description: "Generates a Message House and platform-specific deliverables (talking points, press statement, social posts, grassroots email, op-ed) from a core policy position."
    inputs:
      required: [position]
      optional: [context, organization, target_audience, variants]
    outputs:
      format: markdown + docx
      artifacts: [messaging_matrix.md, messaging_matrix.docx]

  - id: media_list_builder
    name: Media List Builder
    version: 0.1.0
    risk_level: yellow
    path: tools/media_list_builder
    description: "Targeted media pitch list: finds journalists covering an issue by location and media type, with pitch angles, previous coverage, and contact info."
    inputs:
      required: [issue]
      optional: [location, media_types, num_contacts]
    outputs:
      format: xlsx + markdown
      artifacts: [media_list.xlsx, media_list.md]

  - id: stakeholder_briefing
    name: Stakeholder Briefing
    version: 0.1.0
    risk_level: yellow
    path: tools/stakeholder_briefing
    description: "Pre-meeting one-pager: compiles stakeholder profile, policy positions, disclosure data (LDA/FARA/IRS 990), recent news, and suggested talking points."
    inputs:
      required: [stakeholder_name, meeting_purpose]
      optional: [organization, your_organization, context, context_file, include_disclosures, include_news]
    outputs:
      format: markdown + docx
      artifacts: [stakeholder_briefing.md, stakeholder_briefing.docx]

  - id: background_memo_generator
    name: Background Memo Generator
    version: 0.1.0
    risk_level: yellow
    path: tools/background_memo_generator
    description: "Generates a structured background memo on any client, organization, policy issue, or individual. Takes a subject and user-defined section headings; outputs Overview, Fast Facts, content sections, and links in house-style DOCX."
    inputs:
      required: [subject, sections]
      optional: [date, context]
    outputs:
      format: docx + markdown
      artifacts: [background_memo.docx, background_memo.md]

  - id: stakeholder_map_builder
    name: Stakeholder Map Builder
    version: 0.1.0
    risk_level: yellow
    path: tools/stakeholder_map_builder
    description: "Discovers and classifies all policy actors on an issue from LDA filings, LegiScan sponsorships, and news. Classifies by stance, type, and influence tier. Exports interactive network graph, Excel, and DOCX."
    inputs:
      required: [policy_issue]
      optional: [scope, state, year, include_types]
    outputs:
      format: excel + docx + html + json
      artifacts: [stakeholder_map.xlsx, stakeholder_map.docx, stakeholder_map.html, stakeholder_map.json]
